<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sonner 复刻 demo</title>
  <link rel="stylesheet" href="sonner.css">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: #fafafa; color: #18181b;
      font-family: ui-sans-serif, system-ui, -apple-system, "PingFang SC", sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    .panel { display: grid; gap: 16px; padding: 40px; width: 560px; max-width: 92vw; }
    .panel h1 { font-size: 20px; margin: 0; }
    .panel p.sub { margin: 0; color: #71717a; font-size: 14px; }
    .group { display: grid; gap: 8px; }
    .group h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: #a1a1aa; margin: 8px 0 0; font-weight: 600; }
    .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    button {
      font: inherit; font-size: 13px; padding: 8px 14px; border-radius: 9px;
      border: 1px solid rgba(0, 0, 0, 0.12); background: #fff; cursor: pointer;
      transition: transform .1s ease, background .15s ease;
    }
    button:hover { background: #f4f4f5; }
    button:active { transform: scale(0.97); }
    label { font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
    select { font: inherit; font-size: 13px; padding: 7px 10px; border-radius: 9px; border: 1px solid rgba(0,0,0,0.12); background: #fff; }
    .switches { gap: 16px; }
  </style>
</head>
<body>
  <main class="panel">
    <div class="group">
      <h1>Sonner 复刻 demo</h1>
      <p class="sub">纯 HTML/CSS/JS、零依赖。连发几条看堆叠，hover 看展开，拖拽划走关闭。</p>
    </div>

    <div class="group">
      <h2>触发</h2>
      <div class="row">
        <button id="btn-default">默认</button>
        <button id="btn-success">成功</button>
        <button id="btn-error">错误</button>
        <button id="btn-warning">警告</button>
        <button id="btn-info">信息</button>
        <button id="btn-loading">loading</button>
      </div>
      <div class="row">
        <button id="btn-desc">带描述</button>
        <button id="btn-action">带撤销按钮</button>
        <button id="btn-promise">promise</button>
        <button id="btn-burst">连发 3 条</button>
        <button id="btn-clear">全部关闭</button>
      </div>
    </div>

    <div class="group">
      <h2>设置</h2>
      <div class="row">
        <label>位置：
          <select id="sel-pos">
            <option value="bottom-right">bottom-right</option>
            <option value="bottom-center">bottom-center</option>
            <option value="bottom-left">bottom-left</option>
            <option value="top-right">top-right</option>
            <option value="top-center">top-center</option>
            <option value="top-left">top-left</option>
          </select>
        </label>
      </div>
      <div class="row switches">
        <label><input type="checkbox" id="sw-rich"> rich colors</label>
        <label><input type="checkbox" id="sw-expand"> 默认展开</label>
        <label><input type="checkbox" id="sw-dark"> 暗色</label>
        <label><input type="checkbox" id="sw-close"> 关闭按钮</label>
      </div>
    </div>
  </main>

  <script src="sonner.js"></script>
  <script>
    // ---- 触发按钮 ----
    document.getElementById('btn-default').addEventListener('click', function () {
      window.toast('已保存到草稿箱');
    });
    var typeMap = { 'btn-success': 'success', 'btn-error': 'error', 'btn-warning': 'warning', 'btn-info': 'info', 'btn-loading': 'loading' };
    Object.keys(typeMap).forEach(function (id) {
      document.getElementById(id).addEventListener('click', function () {
        var t = typeMap[id];
        var msgs = { success: '上传成功', error: '出错了，请重试', warning: '空间快满了', info: '有 3 条新通知', loading: '正在处理…' };
        window.toast[t](msgs[t]);
      });
    });
    document.getElementById('btn-desc').addEventListener('click', function () {
      window.toast('会议已创建', { description: '周四 14:00 · Design Sync · 已通知 5 位参与者' });
    });
    document.getElementById('btn-action').addEventListener('click', function () {
      window.toast('已删除「未命名文档」', {
        action: { label: '撤销', onClick: function () { window.toast.success('已恢复'); } }
      });
    });
    document.getElementById('btn-promise').addEventListener('click', function () {
      window.toast.promise(new Promise(function (res) { setTimeout(res, 1600); }),
        { loading: '保存中…', success: '已保存', error: '保存失败' });
    });
    document.getElementById('btn-burst').addEventListener('click', function () {
      window.toast('第一条'); window.toast.success('第二条'); window.toast.info('第三条');
    });
    document.getElementById('btn-clear').addEventListener('click', function () {
      window.toast.dismiss();
    });

    // ---- 设置 ----
    document.getElementById('sel-pos').addEventListener('change', function (e) {
      window.toast.configure({ position: e.target.value });
      window.toast(e.target.value);
    });
    document.getElementById('sw-rich').addEventListener('change', function (e) { window.toast.configure({ richColors: e.target.checked }); });
    document.getElementById('sw-expand').addEventListener('change', function (e) { window.toast.configure({ expand: e.target.checked }); });
    document.getElementById('sw-dark').addEventListener('change', function (e) { window.toast.configure({ theme: e.target.checked ? 'dark' : 'light' }); });
    document.getElementById('sw-close').addEventListener('change', function (e) { window.toast.configure({ closeButton: e.target.checked }); });
  </script>
</body>
</html>
